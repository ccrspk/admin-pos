// ════════════════════════════════════════════════════════════
//  SYNC ENGINE v3 — Production Real-Time Firebase Sync
//  Architecture:
//   • Firebase RTDB as single source of truth (cross-device)
//   • BroadcastChannel as zero-latency same-browser fallback
//   • localStorage as offline cache / cold-start seed
//   • Dedicated "orders" node for instant iPhone→Desktop delivery
//   • Dedup via sale ID Set — never duplicate orders
//   • Auto reconnect on network restore
//   • Offline queue with auto-flush on reconnect
// ════════════════════════════════════════════════════════════

const STORE_KEY   = "masalamaster_db";
const SYNC_CH     = "masalamaster_sync_v3";
const DEVICE_ID   = "desktop_" + (localStorage.getItem("mm_did") || (()=>{ const id=Math.random().toString(36).slice(2,8); localStorage.setItem("mm_did",id); return id; })());
const ORDERS_PATH = "masalamaster/orders";
const DB_PATH     = "masalamaster/db";
const VERSION     = 3;

// ── Local DB Helpers ──
function getLocalDB() {
  try { const r = localStorage.getItem(STORE_KEY); if (r) return JSON.parse(r); } catch {}
  return null;
}
function saveLocalDB(db) {
  db._lastUpdated = Date.now();
  db._lastDevice  = DEVICE_ID;
  db._version     = VERSION;
  localStorage.setItem(STORE_KEY, JSON.stringify(db));
}

// ── Firebase Engine ──
// Holds singleton Firebase state outside React
const FB = {
  app: null,
  db: null,
  listeners: {},
  initialized: false,
  configHash: null,
};

function hashConfig(str) { let h=0; for(let i=0;i<str.length;i++) h=(h<<5)-h+str.charCodeAt(i)|0; return h; }

function initFirebase(configStr, callbacks) {
  if (!configStr?.trim()) return false;
  try {
    const config = JSON.parse(configStr);
    if (!config.apiKey || !config.databaseURL) return false;

    const ch = hashConfig(configStr);
    if (FB.initialized && FB.configHash === ch) {
      // Already initialized with same config — just re-attach listeners
      if (callbacks) attachListeners(callbacks);
      return true;
    }

    const doInit = () => {
      try {
        if (!window.firebase) return false;
        // Clean up old app if config changed
        if (FB.app && FB.configHash !== ch) {
          try { FB.app.delete(); } catch {}
          FB.app = null; FB.db = null; FB.initialized = false;
        }
        if (!FB.app) {
          // Check for existing firebase app
          if (firebase.apps && firebase.apps.length > 0) {
            FB.app = firebase.apps[0];
          } else {
            FB.app = firebase.initializeApp(config);
          }
        }
        FB.db = firebase.database();
        FB.initialized = true;
        FB.configHash = ch;
        if (callbacks) attachListeners(callbacks);
        return true;
      } catch(e) { console.warn("[Sync] Firebase init error:", e); return false; }
    };

    if (window.firebase && window.firebase.database) {
      return doInit();
    }

    // Load SDK dynamically
    const urls = [
      "https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js",
      "https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js",
    ];
    let loaded = 0;
    urls.forEach(url => {
      if (document.querySelector(`script[src="${url}"]`)) { if(++loaded===urls.length) doInit(); return; }
      const s = document.createElement("script");
      s.src = url;
      s.onload = () => { if (++loaded === urls.length) doInit(); };
      s.onerror = () => console.warn("[Sync] Failed to load Firebase SDK");
      document.head.appendChild(s);
    });
    return true;
  } catch(e) { console.warn("[Sync] Firebase config parse error:", e); return false; }
}

function attachListeners(callbacks) {
  if (!FB.db) return;
  // Detach old listeners first to avoid duplicates
  detachListeners();

  // Listen to new orders node (iPhone orders come in here instantly)
  FB.listeners.orders = FB.db.ref(ORDERS_PATH).on("child_added", snap => {
    const order = snap.val();
    if (order && order._device !== DEVICE_ID) {
      callbacks.onNewOrder(order, snap.key);
    }
  }, err => console.warn("[Sync] Orders listener error:", err));

  // Listen to full DB node (products, settings changes from iPhone)
  FB.listeners.db = FB.db.ref(DB_PATH).on("value", snap => {
    const remote = snap.val();
    if (remote && remote._lastDevice !== DEVICE_ID) {
      callbacks.onRemoteDB(remote);
    }
  }, err => console.warn("[Sync] DB listener error:", err));

  // Connection state
  FB.listeners.connRef = FB.db.ref(".info/connected");
  FB.listeners.connRef.on("value", snap => {
    callbacks.onConnected(snap.val() === true);
  });
}

function detachListeners() {
  if (!FB.db) return;
  try {
    if (FB.listeners.orders) FB.db.ref(ORDERS_PATH).off("child_added", FB.listeners.orders);
    if (FB.listeners.db)     FB.db.ref(DB_PATH).off("value", FB.listeners.db);
    if (FB.listeners.connRef) FB.listeners.connRef.off("value");
  } catch {}
  FB.listeners = {};
}

function fbPushDB(db) {
  if (!FB.db) return;
  try { FB.db.ref(DB_PATH).set(db); } catch(e) { console.warn("[Sync] Push DB error:", e); }
}

function fbAckOrder(key) {
  // Move order from /orders to /orders_acked to prevent re-delivery
  // (Desktop deletes after processing)
  if (!FB.db || !key) return;
  try { FB.db.ref(`${ORDERS_PATH}/${key}`).remove(); } catch {}
}

// ── Helpers ──
function fmtDate(iso) { return new Date(iso).toLocaleString("en-IN",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function fmtDateShort(iso) { return new Date(iso).toLocaleString("en-IN",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}); }
function today() { return new Date().toDateString(); }
function getProfit(sale, products) {
  return sale.items.reduce((a,it) => {
    const p = products?.find(pp=>pp.name===it.name);
    return a + (it.price - (p?.cost||it.price*.75)) * it.qty;
  }, 0);
}

// ── Toast ──
function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4500); return ()=>clearTimeout(t); }, []);
  const icons = { success:"✓", error:"✕", warn:"⚠", info:"ℹ" };
  return <div className={`toast ${type}`}>{icons[type]||"•"} {msg}</div>;
}

// ── Stat Card ──
function SC({ label, value, sub, icon, color }) {
  return (
    <div className="sc" style={{"--ac": color}}>
      <div className="sico" style={{fontSize:44,color}}>{icon}</div>
      <div className="slabel">{label}</div>
      <div className="sval">{value}</div>
      {sub && <div className="ssub">{sub}</div>}
    </div>
  );
}

function printReceipt(sale, settings, cur) {
  const w = window.open("","_blank","width=420,height=650");
  if (!w) { alert("Pop-up blocked. Allow pop-ups and try again."); return; }
  w.document.write(buildReceiptHTML(sale, settings, cur));
  w.document.close();
  setTimeout(() => { try { w.print(); } catch {} }, 400);
}

// ── Edit Order Modal ──
function EditOrderModal({ sale, products, settings, onSave, onClose }) {
  const cur = settings.currency;
  const [items, setItems]       = useState(sale.items.map(it=>({...it, _voided: it.voided||false})));
  const [discount, setDiscount] = useState(sale.discount||0);
  const [note, setNote]         = useState(sale.note||"");
  const subtotal = items.filter(it=>!it._voided).reduce((a,it)=>a+it.price*it.qty, 0);
  const total    = Math.max(0, subtotal - discount);
  function updItem(i, field, val) {
    setItems(its => its.map((it,idx)=>idx===i?{...it,[field]:field==="qty"?Math.max(1,+val):+val}:it));
  }
  function voidItem(i) { setItems(its=>its.map((it,idx)=>idx===i?{...it,_voided:!it._voided}:it)); }
  function save() {
    onSave({...sale, items:items.map(({_voided,...it})=>({...it,voided:_voided})), discount, total, note, _edited:true, _editedAt:new Date().toISOString()});
  }
  return (
    <div className="mo" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="md" style={{maxWidth:680}}>
        <div className="mh"><h2>Edit Order #{sale.id.slice(-6).toUpperCase()}</h2><button className="bi" onClick={onClose}><I n="x" s={18}/></button></div>
        <div className="mb">
          <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"10px 14px",fontSize:12.5,color:"#92400E",marginBottom:16}}>
            ⚠️ Editing affects totals and reports. Voided items are crossed out on receipt.
          </div>
          <table style={{width:"100%",borderCollapse:"collapse",marginBottom:16}}>
            <thead><tr style={{background:"var(--bg)"}}>
              {["Item","Qty","Unit Price","Subtotal","Action"].map(h=>(
                <th key={h} style={{padding:"8px 10px",fontSize:11,fontWeight:700,color:"var(--text2)",textAlign:"left",borderBottom:"1px solid var(--border)",textTransform:"uppercase"}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {items.map((it,i)=>(
                <tr key={i} style={{opacity:it._voided?.5:1,textDecoration:it._voided?"line-through":"none"}}>
                  <td style={{fontSize:13.5,fontWeight:600}}>{it.name}</td>
                  <td><input type="number" min="1" value={it.qty} onChange={e=>updItem(i,"qty",e.target.value)} disabled={it._voided} style={{width:60,padding:"5px 8px",border:"1.5px solid var(--border)",borderRadius:6,fontSize:13}}/></td>
                  <td><input type="number" min="0" value={it.price} onChange={e=>updItem(i,"price",e.target.value)} disabled={it._voided} style={{width:80,padding:"5px 8px",border:"1.5px solid var(--border)",borderRadius:6,fontSize:13}}/></td>
                  <td style={{fontWeight:600,color:it._voided?"#9CA3AF":"var(--accent)"}}>{cur}{(it.price*it.qty).toFixed(2)}</td>
                  <td><button className={`bi bsm ${it._voided?"bs":"bd"}`} onClick={()=>voidItem(i)}>{it._voided?"↩ Restore":"✕ Void"}</button></td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{display:"flex",gap:20,marginBottom:12,flexWrap:"wrap"}}>
            <div className="fgg" style={{flex:1,minWidth:160}}>
              <label>Discount ({cur})</label>
              <input type="number" min="0" max={subtotal} value={discount} onChange={e=>setDiscount(Math.max(0,Math.min(subtotal,+e.target.value)))}/>
            </div>
            <div className="fgg" style={{flex:2,minWidth:200}}>
              <label>Internal Note</label>
              <input type="text" value={note} onChange={e=>setNote(e.target.value)} placeholder="Reason for edit…"/>
            </div>
          </div>
          <div style={{background:"var(--bg)",borderRadius:10,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{color:"var(--text2)",fontSize:13}}>Subtotal: {cur}{subtotal.toFixed(2)}{discount>0&&<span style={{color:"var(--accent)",marginLeft:8}}>− {cur}{discount.toFixed(2)}</span>}</div>
            <div style={{fontSize:22,fontWeight:800,color:"var(--accent)"}}>New Total: {cur}{total.toFixed(2)}</div>
          </div>
        </div>
        <div className="mf">
          <button className="btn bs" onClick={onClose}>Cancel</button>
          <button className="btn bp" onClick={save}><I n="check" s={15}/> Save Changes</button>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ──
function Dashboard({ db, onShowSale, newOrders, setNewOrders }) {
  const { products, sales, settings } = db;
  const cur = settings.currency;
  const todaySales  = sales.filter(s=>new Date(s.date).toDateString()===today()&&!s.voided);
  const todayRev    = todaySales.reduce((a,s)=>a+s.total, 0);
  const todayProfit = todaySales.reduce((a,s)=>a+getProfit(s,products), 0);
  const monthRev    = sales.filter(s=>Date.now()-new Date(s.date)<30*86400000&&!s.voided).reduce((a,s)=>a+s.total, 0);
  const cashBalance = sales.filter(s=>s.payMethod==="cash"&&!s.voided).reduce((a,s)=>a+s.total,0);
  const lowStock    = products.filter(p=>p.stock>0&&p.stock<=10);
  const outStock    = products.filter(p=>p.stock===0);
  const itemCount   = {};
  sales.forEach(s=>s.items.filter(it=>!it.voided).forEach(it=>{itemCount[it.name]=(itemCount[it.name]||0)+it.qty;}));
  const bestSellers = Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const weekDays    = Array.from({length:7},(_,i)=>{
    const d = new Date(Date.now()-(6-i)*86400000);
    const rev = sales.filter(s=>new Date(s.date).toDateString()===d.toDateString()&&!s.voided).reduce((a,s)=>a+s.total,0);
    return { label:d.toLocaleDateString("en",{weekday:"short"}), value:rev };
  });
  const maxRev = Math.max(...weekDays.map(d=>d.value), 1);

  return (
    <div>
      {newOrders.length>0&&(
        <div className="new-order-banner">
          <div style={{fontSize:28}}>📱</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,fontSize:16}}>New Order{newOrders.length>1?"s":""} from iPhone!</div>
            <div style={{fontSize:13,opacity:.9}}>{newOrders.length} order{newOrders.length>1?"s":""} · {cur}{newOrders.reduce((a,s)=>a+s.total,0).toFixed(0)} total</div>
          </div>
          <button className="btn" style={{background:"rgba(255,255,255,.2)",color:"#fff",border:"1px solid rgba(255,255,255,.35)"}}
            onClick={()=>{ onShowSale(newOrders[0]); setNewOrders([]); }}>View →</button>
          <button style={{background:"none",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:20,padding:"0 4px"}} onClick={()=>setNewOrders([])}>×</button>
        </div>
      )}
      <div className="sgrid">
        <SC label="Today's Revenue"  value={`${cur}${todayRev.toLocaleString()}`}           sub={`${todaySales.length} transactions`}   icon="💰" color="#C8392B"/>
        <SC label="Today's Profit"   value={`${cur}${Math.round(todayProfit).toLocaleString()}`} sub={`${todayRev>0?((todayProfit/todayRev)*100).toFixed(1):0}% margin`} icon="📈" color="#2B7A3D"/>
        <SC label="Monthly Revenue"  value={`${cur}${monthRev.toLocaleString()}`}           sub="Last 30 days"                          icon="📅" color="#E8A020"/>
        <SC label="Cash Drawer"      value={`${cur}${cashBalance.toLocaleString()}`}        sub="Total cash received"                   icon="🏦" color="#7C3AED"/>
      </div>
      <div className="row">
        <div className="c2">
          <div className="card">
            <div className="sh"><h2>Weekly Sales</h2><span className="badge by">Last 7 Days</span></div>
            <div className="cbw">
              {weekDays.map((d,i)=>(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                  <div className="cb" data-tip={`${cur}${d.value}`}
                    style={{height:`${(d.value/maxRev)*100}%`,minHeight:d.value>0?6:2,background:"var(--accent)",opacity:d.value>0?1:.15}}/>
                  <div className="cbl">{d.label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="c1">
          <div className="card" style={{height:"100%"}}>
            <div className="sh"><h2>Best Sellers</h2></div>
            {bestSellers.length===0 ? <p style={{color:"var(--text2)",fontSize:13}}>No data yet</p> :
              bestSellers.map(([name,qty],i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<bestSellers.length-1?"1px solid var(--border)":"none"}}>
                  <span style={{fontSize:13,fontWeight:500}}>{i+1}. {name}</span>
                  <span className="badge bg">{qty} sold</span>
                </div>
              ))}
          </div>
        </div>
      </div>
      <div className="row">
        <div className="c1">
          <div className="card">
            <div className="sh"><h2>⚠️ Low Stock</h2><span className="badge by">{lowStock.length}</span></div>
            {lowStock.length===0 ? <p style={{color:"var(--text2)",fontSize:13}}>All stocked!</p> :
              lowStock.map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--border)"}}>
                  <span style={{fontSize:13}}>{p.image} {p.name}</span>
                  <span className="badge by">{p.stock} left</span>
                </div>
              ))}
          </div>
        </div>
        <div className="c1">
          <div className="card">
            <div className="sh"><h2>🔴 Out of Stock</h2><span className="badge br">{outStock.length}</span></div>
            {outStock.length===0 ? <p style={{color:"var(--text2)",fontSize:13}}>All in stock!</p> :
              outStock.map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid var(--border)"}}>
                  <span style={{fontSize:13}}>{p.image} {p.name}</span>
                  <span className="badge br">Out</span>
                </div>
              ))}
          </div>
        </div>
        <div className="c1">
          <div className="card">
            <div className="sh"><h2>📊 Payment Split</h2></div>
            {[["cash","💵 Cash","#2B7A3D","bg"],["card","💳 Card","#1A56DB","bb"],["online","📱 Online","#7C3AED","bp_"]].map(([m,l,c])=>{
              const rev = todaySales.filter(s=>s.payMethod===m).reduce((a,s)=>a+s.total,0);
              const pct = todayRev>0?(rev/todayRev)*100:0;
              return (
                <div key={m} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}>
                    <span style={{fontWeight:600}}>{l}</span>
                    <span style={{fontWeight:700,color:c}}>{cur}{rev.toLocaleString()}</span>
                  </div>
                  <div className="prog"><div className="prog-bar" style={{width:`${pct}%`,background:c}}/></div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Inventory ──
function Inventory({ db, setDb, showToast, syncSave }) {
  const [search, setSearch] = useState("");
  const [catF, setCatF]     = useState("All");
  const [modal, setModal]   = useState(false);
  const [editing, setEd]    = useState(null);
  const [form, setForm]     = useState({});
  const bRef = useRef(null);

  const cats     = ["All", ...new Set(db.products.map(p=>p.category))];
  const filtered = db.products.filter(p => {
    const ms = p.name.toLowerCase().includes(search.toLowerCase())||p.barcode.includes(search)||p.code.includes(search);
    return ms && (catF==="All"||p.category===catF);
  });

  function openAdd() { setEd(null); setForm({name:"",code:"",barcode:"",category:"Grains",price:"",cost:"",stock:"",unit:"Kg",supplier:"",tax:"5",image:"📦"}); setModal(true); }
  function openEdit(p) { setEd(p.id); setForm({...p}); setModal(true); }

  function save() {
    if (!form.name||!form.barcode||!form.price) { showToast("Fill all required fields","error"); return; }
    let products;
    if (editing) {
      products = db.products.map(p=>p.id===editing?{...form,id:editing,price:+form.price,cost:+form.cost,stock:+form.stock,tax:+form.tax}:p);
      showToast("Product updated!","success");
    } else {
      if (db.products.find(p=>p.barcode===form.barcode)) { showToast("Barcode already exists","error"); return; }
      products = [...db.products,{...form,id:"p"+Date.now(),price:+form.price,cost:+form.cost,stock:+form.stock,tax:+form.tax}];
      showToast("Product added!","success");
    }
    syncSave({...db,products}); setModal(false);
  }
  function del(id) {
    if (!confirm("Delete this product?")) return;
    syncSave({...db,products:db.products.filter(p=>p.id!==id)});
    showToast("Product deleted","warn");
  }
  function adj(id,delta) { syncSave({...db,products:db.products.map(p=>p.id===id?{...p,stock:Math.max(0,p.stock+delta)}:p)}); }

  const SB = s => s===0 ? <span className="badge br">Out</span> : s<=10 ? <span className="badge by">{s}</span> : <span className="badge bg">{s}</span>;

  function exportCSV() {
    const rows = [["Code","Barcode","Name","Category","Cost","Price","Stock","Unit","Supplier","Tax%"]];

// ── Sales History ──
function SalesHistory({ db, syncSave, showToast }) {
  const { sales, settings, products } = db;
  const cur = settings.currency;
  const [sel, setSel]         = useState(null);
  const [editing, setEditing] = useState(null);
  const [dateFrom, setDateFrom] = useState("");
  const [dateTo, setDateTo]   = useState("");
  const [searchQ, setSearchQ] = useState("");
  const [payF, setPayF]       = useState("all");
  const [sourceF, setSourceF] = useState("all");

  const filtered = useMemo(() => {
    return [...sales].reverse().filter(s => {
      const d = new Date(s.date);
      if (dateFrom && d < new Date(dateFrom)) return false;
      if (dateTo   && d > new Date(dateTo+"T23:59:59")) return false;
      if (payF!=="all" && s.payMethod!==payF) return false;
      if (sourceF!=="all" && s.source!==sourceF) return false;
      if (searchQ && !s.id.includes(searchQ) && !s.items.some(it=>it.name.toLowerCase().includes(searchQ.toLowerCase()))) return false;
      return true;
    });
  }, [sales, dateFrom, dateTo, payF, sourceF, searchQ]);

  const totalRev    = filtered.filter(s=>!s.voided).reduce((a,s)=>a+s.total, 0);
  const totalProfit = filtered.filter(s=>!s.voided).reduce((a,s)=>a+getProfit(s,products), 0);

  function voidSale(id) {
    if (!confirm("Void this entire sale?")) return;
    syncSave({...db, sales:db.sales.map(s=>s.id===id?{...s,voided:true,voidedAt:new Date().toISOString()}:s)});
    setSel(null); showToast("Sale voided","warn");
  }

  function saveEdit(updated) {
    syncSave({...db, sales:db.sales.map(s=>s.id===updated.id?updated:s)});
    setEditing(null); showToast("Order updated","success");
  }

  function exportCSV() {
    const rows = [["ID","Date","Cashier","Source","Items","Total","PayMethod","Paid","Change","Voided"]];
    filtered.forEach(s=>rows.push([s.id,new Date(s.date).toLocaleString(),s.cashier,s.source||"desktop",s.items.length,s.total,s.payMethod||"cash",s.paid,s.change,s.voided?"YES":""]));
    const a = document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(r=>r.join(",")).join("\n"));
    a.download="masala-sales.csv"; a.click();
    showToast("Sales exported","success");
  }

  const payIcon    = { cash:"💵", card:"💳", online:"📱" };
  const sourceIcon = { iphone:"📱", desktop:"🖥️" };

  return (
    <div>
      <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"14px 18px",marginBottom:16}}>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
          <div className="iw" style={{flex:1,minWidth:180}}>
            <span className="ii"><I n="search" s={14}/></span>
            <input placeholder="Search orders…" value={searchQ} onChange={e=>setSearchQ(e.target.value)}/>
          </div>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{width:150}}/>
          <input type="date" value={dateTo}   onChange={e=>setDateTo(e.target.value)}   style={{width:150}}/>
          <select value={payF} onChange={e=>setPayF(e.target.value)} style={{width:130}}>
            <option value="all">All Methods</option>
            <option value="cash">💵 Cash</option>
            <option value="card">💳 Card</option>
            <option value="online">📱 Online</option>
          </select>
          <select value={sourceF} onChange={e=>setSourceF(e.target.value)} style={{width:130}}>
            <option value="all">All Sources</option>
            <option value="iphone">📱 iPhone</option>
            <option value="desktop">🖥️ Desktop</option>
          </select>
          <button className="btn bs" onClick={()=>{setDateFrom("");setDateTo("");setPayF("all");setSourceF("all");setSearchQ("");}}>Clear</button>
          <button className="btn bs" onClick={exportCSV}><I n="download" s={14}/> Export</button>
        </div>
      </div>

      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        {[
          ["Transactions", filtered.length],
          ["Revenue", `${cur}${totalRev.toLocaleString()}`],
          ["Profit", `${cur}${Math.round(totalProfit).toLocaleString()}`],
          ["Avg Sale", `${cur}${filtered.filter(s=>!s.voided).length?Math.round(totalRev/filtered.filter(s=>!s.voided).length):0}`],
        ].map(([l,v])=>(
          <div key={l} className="card" style={{flex:1,minWidth:100,padding:"12px 16px"}}>
            <div className="slabel" style={{fontSize:10}}>{l}</div>
            <div className="sval" style={{fontSize:18}}>{v}</div>
          </div>
        ))}
      </div>

      <div className="tw">
        <table>
          <thead><tr><th>Order #</th><th>Date & Time</th><th>Source</th><th>Cashier</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            {filtered.map(s=>(
              <tr key={s.id} style={{opacity:s.voided?.5:1}}>
                <td><span className="tag">#{s.id.slice(-6).toUpperCase()}</span></td>
                <td style={{fontSize:12.5,color:"var(--text2)"}}>{fmtDateShort(s.date)}</td>
                <td style={{fontSize:13}}>{sourceIcon[s.source]||"🖥️"} {s.source||"desktop"}</td>
                <td>{s.cashier}</td>
                <td>{s.items.filter(it=>!it.voided).length} items</td>
                <td style={{fontWeight:700,color:"var(--accent)"}}>{cur}{s.total.toFixed(2)}</td>
                <td><span className="badge bg">{payIcon[s.payMethod]||"💵"} {s.payMethod||"cash"}</span></td>
                <td>
                  {s.voided ? <span className="badge br">Voided</span> : s._edited ? <span className="badge by">Edited</span> : <span className="badge bg">Paid</span>}
                </td>
                <td>
                  <div style={{display:"flex",gap:5}}>
                    <button className="bi bsm" onClick={()=>setSel(s)}><I n="receipt" s={13}/></button>
                    <button className="bi bsm" onClick={()=>printReceipt(s,settings,cur)}><I n="print" s={13}/></button>
                    {!s.voided&&<button className="bi bsm" onClick={()=>setEditing(s)}><I n="edit" s={13}/></button>}
                    {!s.voided&&<button className="bi bsm bd" onClick={()=>voidSale(s.id)}><I n="void" s={13}/></button>}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length===0&&<div style={{padding:"40px",textAlign:"center",color:"var(--text2)"}}>No sales match your filters</div>}
      </div>

      {sel&&(
        <div className="mo" onClick={e=>e.target===e.currentTarget&&setSel(null)}>
          <div className="md" style={{maxWidth:420}}>
            <div className="mh"><h2>Receipt #{sel.id.slice(-6).toUpperCase()}</h2><button className="bi" onClick={()=>setSel(null)}><I n="x" s={18}/></button></div>
            <div className="mb">
              {sel.voided&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",marginBottom:12,color:"#991B1B",fontWeight:600,fontSize:13}}>⚠️ This sale has been voided</div>}
              <div className="rp">
                <div style={{textAlign:"center",marginBottom:8}}>
                  <strong>{settings.storeName}</strong><br/>
                  <span style={{fontSize:11}}>{settings.address}</span><br/>
                  <span style={{fontSize:11}}>Tel: {settings.phone} · GSTIN: {settings.gstin}</span>
                </div>
                <hr/>
                <div>Date: {new Date(sel.date).toLocaleString()}</div>
                <div>Cashier: {sel.cashier} {sel.source==="iphone"?"📱":""}</div>
                <div>Order: #{sel.id.slice(-6).toUpperCase()}</div>
                <hr/>
                {sel.items.map((it,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",textDecoration:it.voided?"line-through":"none",opacity:it.voided?.5:1}}>
                    <span>{it.name} ×{it.qty}</span><span>{cur}{(it.price*it.qty).toFixed(2)}</span>
                  </div>
                ))}
                <hr/>
                {sel.discount>0&&<div style={{display:"flex",justifyContent:"space-between",color:"#C8392B"}}><span>Discount</span><span>-{cur}{sel.discount.toFixed(2)}</span></div>}
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:"bold"}}><span>TOTAL</span><span>{cur}{sel.total.toFixed(2)}</span></div>
                <div style={{display:"flex",justifyContent:"space-between"}}><span>Paid ({sel.payMethod||"cash"})</span><span>{cur}{(sel.paid||sel.total).toFixed(2)}</span></div>
                {sel.change>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span>Change</span><span>{cur}{sel.change.toFixed(2)}</span></div>}
                <hr/>
                <div style={{textAlign:"center",fontSize:11}}>Thank you! Visit again 🙏</div>
              </div>
            </div>
            <div className="mf">
              <button className="btn bs" onClick={()=>setSel(null)}>Close</button>
              <button className="btn bp" onClick={()=>printReceipt(sel,settings,cur)}><I n="print" s={14}/> Print</button>
            </div>
          </div>
        </div>
      )}
      {editing&&<EditOrderModal sale={editing} products={products} settings={settings} onSave={saveEdit} onClose={()=>setEditing(null)}/>}
    </div>
  );
}

// ── Analytics ──
function Analytics({ db }) {
  const { products, sales, settings } = db;
  const cur = settings.currency;
  const [range, setRange] = useState("30");
  const days = parseInt(range);
  const filtered = sales.filter(s=>Date.now()-new Date(s.date)<days*86400000&&!s.voided);
  const revenue  = filtered.reduce((a,s)=>a+s.total,0);
  const profit   = filtered.reduce((a,s)=>a+getProfit(s,products),0);
  const payBreak = {cash:0,card:0,online:0};
  filtered.forEach(s=>{ if(payBreak[s.payMethod]!==undefined) payBreak[s.payMethod]+=s.total; });
  const catRev   = {};
  filtered.forEach(s=>s.items.filter(it=>!it.voided).forEach(it=>{
    const p=products.find(pp=>pp.name===it.name);
    catRev[p?.category||"Other"]=(catRev[p?.category||"Other"]||0)+it.price*it.qty;
  }));
  const catEntries = Object.entries(catRev).sort((a,b)=>b[1]-a[1]);
  const maxCat     = Math.max(...catEntries.map(e=>e[1]),1);

  const chartDays = Array.from({length:Math.min(days,30)},(_,i)=>{
    const d=new Date(Date.now()-(Math.min(days,30)-1-i)*86400000);
    const rev=filtered.filter(s=>new Date(s.date).toDateString()===d.toDateString()).reduce((a,s)=>a+s.total,0);
    return {label:d.toLocaleDateString("en",{day:"numeric",month:"short"}),value:rev};
  });
  const maxChart = Math.max(...chartDays.map(d=>d.value),1);

  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:20,alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:600,color:"var(--text2)"}}>Time range:</span>
        {[["7","7 Days"],["30","30 Days"],["90","3 Months"],["365","1 Year"]].map(([v,l])=>(
          <button key={v} className={`btn ${range===v?"bp":"bs"}`} style={{padding:"6px 14px"}} onClick={()=>setRange(v)}>{l}</button>
        ))}
      </div>

      <div className="sgrid">
        <SC label="Total Revenue"   value={`${cur}${revenue.toLocaleString()}`}              sub={`${filtered.length} transactions`}                                  icon="💰" color="#C8392B"/>
        <SC label="Total Profit"    value={`${cur}${Math.round(profit).toLocaleString()}`}    sub={`${revenue>0?((profit/revenue)*100).toFixed(1):0}% margin`}         icon="📈" color="#2B7A3D"/>
        <SC label="Avg Order Value" value={`${cur}${filtered.length?Math.round(revenue/filtered.length):0}`} sub="Per transaction"                                    icon="🎯" color="#7C3AED"/>
        <SC label="Daily Average"   value={`${cur}${Math.round(revenue/days)}`}              sub={`Over ${days} days`}                                                icon="📅" color="#E8A020"/>
      </div>

      <div className="row">
        <div style={{flex:3}}>
          <div className="card">
            <div className="sh"><h2>Revenue Trend</h2><span className="badge by">Last {Math.min(days,30)} Days</span></div>
            <div className="cbw">
              {chartDays.map((d,i)=>(
                <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                  <div className="cb" data-tip={`${cur}${d.value}`}
                    style={{height:`${(d.value/maxChart)*100}%`,minHeight:d.value>0?4:2,background:"var(--accent)",opacity:d.value>0?1:.12}}/>
                  {i%5===0&&<div className="cbl">{d.label}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={{flex:1}}>
          <div className="card" style={{height:"100%"}}>
            <div className="sh"><h2>Payment Mix</h2></div>
            {Object.entries(payBreak).map(([m,v])=>{
              const pct=revenue>0?(v/revenue)*100:0;
              const colors={cash:"#2B7A3D",card:"#1A56DB",online:"#7C3AED"};
              const icons ={cash:"💵",card:"💳",online:"📱"};
              return (
                <div key={m} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}>
                    <span>{icons[m]} {m}</span><span style={{fontWeight:700}}>{pct.toFixed(0)}%</span>
                  </div>
                  <div className="prog"><div className="prog-bar" style={{width:`${pct}%`,background:colors[m]}}/></div>
                  <div style={{fontSize:11,color:"var(--text2)",marginTop:2}}>{cur}{v.toLocaleString()}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="row">
        <div className="c1">
          <div className="card">
            <div className="sh"><h2>Revenue by Category</h2></div>
            {catEntries.length===0 ? <p style={{color:"var(--text2)"}}>No sales yet</p> :
              catEntries.map(([cat,rev])=>(
                <div key={cat} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:13}}>
                    <span style={{fontWeight:600}}>{cat}</span>
                    <span style={{color:"var(--accent)",fontWeight:700}}>{cur}{rev.toLocaleString()}</span>
                  </div>
                  <div className="prog"><div className="prog-bar" style={{width:`${(rev/maxCat)*100}%`,background:"var(--accent)"}}/></div>
                </div>
              ))}
          </div>
        </div>
        <div className="c1">
          <div className="card">
            <div className="sh"><h2>Stock Health</h2></div>
            {[["Healthy (>10)",products.filter(p=>p.stock>10).length,"bg"],["Low (1–10)",products.filter(p=>p.stock>0&&p.stock<=10).length,"by"],["Out of Stock",products.filter(p=>p.stock===0).length,"br"]].map(([l,c,cls])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
                <span>{l}</span><span className={`badge ${cls}`}>{c} products</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Settings ──
function Settings({ db, syncSave, showToast, syncStatus, lastSyncTime, fbConnected, onTestSync }) {
  const [form, setForm] = useState({...db.settings});
  const [testing, setTesting] = useState(false);

  function save() {
    const nd = {...db, settings:{...form}};
    syncSave(nd);
    if (form.firebaseConfig !== db.settings.firebaseConfig) {
      window.location.reload(); // re-init Firebase cleanly
    }
    showToast("Settings saved & synced!","success");
  }

  function reset() {
    if (!confirm("Reset ALL data? This cannot be undone.")) return;
    localStorage.clear(); location.reload();
  }

  function doTest() {
    setTesting(true);
    onTestSync();
    setTimeout(()=>setTesting(false),3000);
    showToast("Test ping sent — check iPhone for sync","info");
  }

  const syncColors = { connected:"#22C55E", syncing:"#E8A020", error:"#C8392B", offline:"#9CA3AF", idle:"#6B7280" };

  return (
    <div style={{maxWidth:700}}>
      <div className="card" style={{marginBottom:16}}>
        <h3 style={{fontFamily:"Syne",fontWeight:700,marginBottom:18,fontSize:17}}>Store Settings</h3>
        <div className="fg">

        </p>

          <div className="card" style={{flex:1,padding:"12px 16px",boxShadow:"none",border:"1px solid var(--border)"}}>

            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:syncColors[syncStatus],animation:syncStatus==="connected"?"pulse 3s infinite":syncStatus==="syncing"?"pulse .7s infinite":"none"}}/>
              <span style={{fontWeight:700,fontSize:14,textTransform:"capitalize"}}>{syncStatus==="connected"?"Live ✓":syncStatus}</span>
            </div>
          </div>
          <div className="card" style={{flex:1,padding:"12px 16px",boxShadow:"none",border:"1px solid var(--border)"}}>
            <div className="slabel" style={{fontSize:10}}>Firebase</div>
            <div style={{fontWeight:700,fontSize:13,marginTop:4,color:fbConnected?"#166534":"#991B1B"}}>{fbConnected?"Connected 🟢":"Not connected 🔴"}</div>
          </div>
          <div className="card" style={{flex:1,padding:"12px 16px",boxShadow:"none",border:"1px solid var(--border)"}}>
            <div className="slabel" style={{fontSize:10}}>Last Sync</div>
            <div style={{fontWeight:700,fontSize:12,marginTop:4}}>{lastSyncTime ? new Date(lastSyncTime).toLocaleTimeString() : "N/A"}</div>
          </div>
        </div>

        <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"12px 16px",marginBottom:14,fontSize:13}}>
          <strong>📋 How to set up Firebase (free):</strong><br/>
          1. Go to <a href="https://console.firebase.google.com" target="_blank" style={{color:"#1A56DB"}}>console.firebase.google.com</a><br/>
          2. Create project → Build → Realtime Database → Create database → Start in test mode<br/>
          3. Project Settings (⚙️) → Add app (Web) → Copy the config JSON → Paste below<br/>
          4. Paste the <strong>same config</strong> in both Desktop and iPhone apps → Save
        </div>

        <div className="fgg" style={{marginBottom:14}}>
          <label>Firebase Config JSON</label>
          <textarea rows={6} value={form.firebaseConfig||""} onChange={e=>setForm(f=>({...f,firebaseConfig:e.target.value}))}
            placeholder={`{\n  "apiKey": "AIzaSy...",\n  "authDomain": "your-app.firebaseapp.com",\n  "databaseURL": "https://your-app-default-rtdb.firebaseio.com",\n  "projectId": "your-app"\n}`}
            style={{fontFamily:"monospace",fontSize:12,resize:"vertical"}}/>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button className="btn bp" onClick={save}><I n="check" s={14}/> Save & Apply Config</button>
          <button className="btn bs" onClick={doTest} disabled={testing}><I n="sync" s={14}/> {testing?"Testing…":"Test Connection"}</button>
        </div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <h3 style={{fontFamily:"Syne",fontWeight:700,marginBottom:16,fontSize:17}}>🖨️ Printer Settings</h3>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
          {[["58mm","58mm Thermal"],["80mm","80mm Thermal"],["A4","A4 Paper"]].map(([v,l])=>(
            <label key={v} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",border:`2px solid ${form.thermalWidth===v?"var(--accent)":"var(--border)"}`,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,background:form.thermalWidth===v?"#FFF0EE":"#fff"}}>
              <input type="radio" name="tw" value={v} checked={form.thermalWidth===v} onChange={e=>setForm(f=>({...f,thermalWidth:e.target.value}))} style={{width:"auto"}}/>{l}
            </label>
          ))}
        </div>
        <div style={{marginTop:12}}>
          <button className="btn bs" onClick={save}><I n="check" s={14}/> Save</button>
        </div>
      </div>

      <div className="card" style={{border:"1.5px solid #FECACA"}}>
        <h3 style={{fontFamily:"Syne",fontWeight:700,marginBottom:8,color:"var(--accent)",fontSize:17}}>⚠️ Danger Zone</h3>
        <p style={{fontSize:13,color:"var(--text2)",marginBottom:14}}>Permanently deletes all data. Cannot be undone.</p>
        <button className="btn bd" onClick={reset}><I n="trash" s={14}/> Reset All Data</button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  SYNC MANAGER HOOK — Production Real-Time Engine
// ════════════════════════════════════════════════════════════
function useSyncManager(db, setDb, setNewOrders, showToast) {
  const [syncStatus, setSyncStatus]     = useState("idle");
  const [fbConnected, setFbConnected]   = useState(false);
  const [lastSyncTime, setLastSyncTime] = useState(null);
  const dbRef       = useRef(db);
  const seenSaleIds = useRef(new Set(db.sales.map(s=>s.id)));
  dbRef.current     = db;

  // Called on every db save — writes to localStorage + Firebase
  function syncSave(newDb) {
    newDb._lastUpdated = Date.now();
    newDb._lastDevice  = DEVICE_ID;
    saveLocalDB(newDb);
    setDb(newDb);
    if (FB.db) {
      try { FB.db.ref(DB_PATH).set(newDb); } catch {}
    }
    // Broadcast to same-browser tabs
    try { new BroadcastChannel(SYNC_CH).postMessage({type:"db",db:newDb,from:DEVICE_ID}); } catch {}
    setLastSyncTime(Date.now());
  }

  // Merge incoming DB (products + settings only, not sales — those come via orders node)
  function mergeRemoteDB(remote) {
    const local = dbRef.current;
    if (!remote || remote._lastDevice === DEVICE_ID) return;

    // Merge sales with dedup
    const newSales = (remote.sales||[]).filter(s => !seenSaleIds.current.has(s.id));
    newSales.forEach(s => seenSaleIds.current.add(s.id));

    const merged = {
      ...local,
      products: remote.products || local.products,
      settings: local.settings, // Desktop always wins settings
      sales: [...local.sales, ...newSales],
      _lastUpdated: Date.now(),
      _lastDevice: DEVICE_ID,
    };
    saveLocalDB(merged);
    setDb(merged);
    setLastSyncTime(Date.now());
    setSyncStatus("connected");

    if (newSales.length > 0) {
      const iphoneOrders = newSales.filter(s=>s.source==="iphone");
      if (iphoneOrders.length > 0) {
        setNewOrders(prev=>[...prev,...iphoneOrders]);
        showToast(`📱 ${iphoneOrders.length} new order${iphoneOrders.length>1?"s":""} from iPhone!`,"success");
      }
    }
  }

  // Handle individual order from orders node (fastest path)
  function receiveOrder(order, key) {
    if (!order || seenSaleIds.current.has(order.id)) {
      // Already processed — just ack
      if (key) fbAckOrder(key);
      return;
    }
    seenSaleIds.current.add(order.id);

    const local = dbRef.current;
    const merged = {
      ...local,
      products: order._products || local.products, // iPhone may send updated stock
      sales: [...local.sales, order],
      _lastUpdated: Date.now(),
      _lastDevice: DEVICE_ID,
    };
    saveLocalDB(merged);
    setDb(merged);
    setLastSyncTime(Date.now());
    setSyncStatus("connected");

    setNewOrders(prev=>[...prev, order]);
    showToast(`📱 New order from iPhone! ${local.settings?.currency||"₹"}${order.total?.toFixed(0)}`, "success");

    // Auto-navigate to Sales if enabled
    if (local.settings?.autoOpenOrders) {
      window._mmAutoOpenSales?.();
    }

    // Acknowledge — remove from queue
    if (key) fbAckOrder(key);
  }

  useEffect(() => {
    // ── BroadcastChannel (same browser, zero latency) ──
    let bc;
    try {
      bc = new BroadcastChannel(SYNC_CH);
      bc.onmessage = (e) => {
        if (!e.data || e.data.from === DEVICE_ID) return;
        if (e.data.type === "db")    mergeRemoteDB(e.data.db);
        if (e.data.type === "order") receiveOrder(e.data.order, null);
      };
    } catch {}

    // ── Online/Offline ──
    const onOnline  = () => { setSyncStatus("connected"); setFbConnected(true); };
    const onOffline = () => { setSyncStatus("offline"); setFbConnected(false); };
    window.addEventListener("online",  onOnline);
    window.addEventListener("offline", onOffline);

    // ── Firebase ──
    const cfg = db.settings?.firebaseConfig;
    if (cfg?.trim()) {
      setSyncStatus("syncing");
      initFirebase(cfg, {
        onNewOrder:   receiveOrder,
        onRemoteDB:   mergeRemoteDB,
        onConnected:  (connected) => {
          setFbConnected(connected);
          setSyncStatus(connected ? "connected" : "offline");
          if (connected) setLastSyncTime(Date.now());
        },
      });
    }

    // ── Retry Firebase init if SDK loads late ──
    const retryTimer = setInterval(() => {
      if (!FB.initialized && db.settings?.firebaseConfig) {
        initFirebase(db.settings.firebaseConfig, {
          onNewOrder:   receiveOrder,
          onRemoteDB:   mergeRemoteDB,
          onConnected:  (c) => { setFbConnected(c); setSyncStatus(c?"connected":"offline"); },
        });
      }
    }, 3000);

    // ── Storage event (cross-tab fallback) ──
    const onStorage = (e) => {
      if (e.key !== STORE_KEY) return;
      try {
        const remote = JSON.parse(e.newValue);
        if (remote?._lastDevice !== DEVICE_ID) mergeRemoteDB(remote);
      } catch {}
    };
    window.addEventListener("storage", onStorage);

    // Initial status
    if (!navigator.onLine) setSyncStatus("offline");

    return () => {
      bc?.close();
      clearInterval(retryTimer);
      window.removeEventListener("online",  onOnline);
      window.removeEventListener("offline", onOffline);
      window.removeEventListener("storage", onStorage);
      detachListeners();
    };
  }, []);

  return { syncStatus, fbConnected, lastSyncTime, syncSave };
}

// ── App Root ──
function App() {
  const [db, setDb]         = useState(()=>initDB());
  const [tab, setTab]       = useState("dashboard");
  const [toasts, setToasts] = useState([]);
  const [time, setTime]     = useState(new Date());
  const [newOrders, setNewOrders] = useState([]);

  function showToast(msg, type="success") {
    const id = Date.now();
    setToasts(ts=>[...ts,{id,msg,type}]);
    setTimeout(()=>setToasts(ts=>ts.filter(t=>t.id!==id)), 5000);
  }

  const { syncStatus, fbConnected, lastSyncTime, syncSave } = useSyncManager(db, setDb, setNewOrders, showToast);

  // Register auto-navigate hook for incoming orders
  useEffect(() => {
    window._mmAutoOpenSales = () => setTab("sales");
    return () => { delete window._mmAutoOpenSales; };
  }, []);

  useEffect(()=>{ const t=setInterval(()=>setTime(new Date()),1000); return ()=>clearInterval(t); },[]);

  // Auto-open sales when new iPhone orders arrive
  useEffect(() => {
    if (newOrders.length > 0 && db.settings?.autoOpenOrders) setTab("sales");
  }, [newOrders.length]);

  const low = db.products.filter(p=>p.stock>0&&p.stock<=10).length;
  const out = db.products.filter(p=>p.stock===0).length;

  const syncColors = { connected:"#22C55E", syncing:"#E8A020", error:"#C8392B", offline:"#6B7280", idle:"#6B7280" };
  const syncLabels = { connected:"Live", syncing:"Syncing…", error:"Error", offline:"Offline", idle:"Local" };

  const nav = [
    {id:"dashboard",n:"dashboard",l:"Dashboard"},
    {id:"inventory",n:"inventory",l:"Inventory"},
    {id:"sales",n:"sales",l:"Sales History"},
    {id:"analytics",n:"analytics",l:"Analytics"},
    {id:"settings",n:"settings",l:"Settings"},
  ];

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <aside className="sidebar">
          <div className="sl">
            <div style={{fontSize:28,marginBottom:4}}>🌶️</div>
            <h1>Masala Master</h1>
            <small>POS & Admin System</small>
            <button className="sync-pill" onClick={()=>setTab("settings")} style={{color:syncColors[syncStatus]}}>
              <div className={`sdot ${syncStatus}`}/>
              <span>{syncLabels[syncStatus]}</span>
              {fbConnected && <span style={{marginLeft:"auto",fontSize:10,opacity:.6}}>Firebase ✓</span>}
            </button>
          </div>

          <nav className="snav">
            <div className="nsec">Main</div>
            {nav.map(item=>(
              <div key={item.id} className={`ni${tab===item.id?" active":""}`} onClick={()=>setTab(item.id)}>
                <I n={item.n} s={17}/>{item.l}
                {item.id==="inventory" && out>0 && <span className="nbadge">{out}</span>}
                {item.id==="sales" && newOrders.length>0 && <span className="nbadge new">{newOrders.length}</span>}
              </div>
            ))}
          </nav>

          <div style={{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,.07)",fontSize:11,color:"#4B3E2F"}}>
            <div>{db.products.length} products · {db.sales.length} sales</div>
            <div style={{marginTop:3}}>v3.0 · Real-Time Sync</div>
          </div>
        </aside>

        <main className="main">
          <div className="topbar">
            <div className="tt">{{dashboard:"Dashboard",inventory:"Inventory",sales:"Sales History",analytics:"Analytics",settings:"Settings"}[tab]}</div>
            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              {newOrders.length>0&&(
                <button className="btn" style={{background:"#C8392B",color:"#fff",animation:"nbounce .4s ease"}}
                  onClick={()=>{setTab("sales");setNewOrders([]);}}>
                  📱 {newOrders.length} New Order{newOrders.length>1?"s":""}
                </button>
              )}
              {low>0&&<div style={{display:"flex",alignItems:"center",gap:5,background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"5px 10px",fontSize:12.5,color:"#92400E",cursor:"pointer"}} onClick={()=>setTab("inventory")}>⚠️ {low} low stock</div>}
              <div style={{fontSize:12.5,color:"var(--text2)",fontWeight:500}}>
                {time.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"})}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:5,background:navigator.onLine?"#DCFCE7":"#FEF2F2",border:`1px solid ${navigator.onLine?"#BBF7D0":"#FECACA"}`,borderRadius:8,padding:"5px 10px",fontSize:12.5,color:navigator.onLine?"#166534":"#991B1B"}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:navigator.onLine?"#22C55E":"#C8392B"}}/>
                {navigator.onLine?"Online":"Offline"}
              </div>
            </div>
          </div>

          <div className="content">
            {tab==="dashboard"  && <Dashboard  db={db} onShowSale={s=>{setTab("sales");}} newOrders={newOrders} setNewOrders={setNewOrders}/>}
            {tab==="inventory"  && <Inventory  db={db} setDb={setDb} showToast={showToast} syncSave={syncSave}/>}
            {tab==="sales"      && <SalesHistory db={db} syncSave={syncSave} showToast={showToast}/>}
            {tab==="analytics"  && <Analytics  db={db}/>}
            {tab==="settings"   && <Settings   db={db} syncSave={syncSave} showToast={showToast} syncStatus={syncStatus} lastSyncTime={lastSyncTime} fbConnected={fbConnected} onTestSync={()=>{ if(FB.db) try{FB.db.ref("masalamaster/ping").set({from:DEVICE_ID,t:Date.now()});}catch{} }}/>}
          </div>
        </main>
      </div>

      {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onClose={()=>setToasts(ts=>ts.filter(x=>x.id!==t.id))}/>)}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
